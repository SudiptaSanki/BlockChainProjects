<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Square representing Gift Card -->
  <rect x="14" y="14" width="100" height="100" rx="16" fill="url(#glowGrad)" stroke="url(#grad)" stroke-width="4" />
  
  <!-- Ribbon Loop on Top (forming G shape loop) -->
  <path d="M 64,30 C 50,15 35,30 50,45 C 64,60 64,30 64,30 C 64,30 64,60 78,45 C 93,30 78,15 64,30 Z" fill="url(#grad)" />
  
  <!-- Gift Ribbon Cross -->
  <line x1="64" y1="42" x2="64" y2="110" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  <line x1="18" y1="70" x2="110" y2="70" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- G-shape wrapping accent -->
  <path d="M 40,84 A 20,20 0 1,0 64,60 H 48" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
</svg>
