<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Outer leaf ring -->
  <circle cx="64" cy="64" r="54" fill="url(#glow)" stroke="url(#grad)" stroke-width="4" stroke-dasharray="10 6" />
  
  <!-- Sprouting plant/leaf design inside -->
  <path d="M 64,110 C 64,80 44,60 44,40 C 44,24 64,18 64,18 C 64,18 84,24 84,40 C 84,60 64,80 64,110 Z" fill="url(#grad)" />
  <path d="M 64,18 L 64,110" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.3" />
  <path d="M 64,48 C 54,42 54,32 54,32" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4" />
  <path d="M 64,68 C 74,62 74,52 74,52" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.4" />
</svg>
