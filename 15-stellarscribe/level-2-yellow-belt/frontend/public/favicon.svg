<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f51b5" />
      <stop offset="100%" stop-color="#e07a5f" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f51b5" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#e07a5f" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Outer Ring representing ledger/publishing loop -->
  <circle cx="64" cy="64" r="54" fill="url(#glow)" stroke="url(#grad)" stroke-width="4" stroke-dasharray="6 4" />
  
  <!-- Quill pen and Paper sheet -->
  <!-- Paper Sheet -->
  <path d="M 38,34 L 82,34 C 86,34 90,38 90,42 L 90,94 C 90,98 86,102 82,102 L 38,102 C 34,102 30,98 30,94 L 30,42 C 30,38 34,34 38,34 Z" fill="none" stroke="url(#grad)" stroke-width="5" />
  <!-- Writing Lines -->
  <line x1="42" y1="50" x2="78" y2="50" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="42" y1="66" x2="78" y2="66" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="42" y1="82" x2="66" y2="82" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" />
  
  <!-- Quill Pen -->
  <path d="M 98,22 L 74,58 L 84,62 L 108,26 Z" fill="url(#grad)" />
  <path d="M 74,58 L 68,68 L 78,62" fill="url(#grad)" />
</svg>
