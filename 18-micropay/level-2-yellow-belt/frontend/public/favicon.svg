<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>
  </defs>
  
  <!-- Outer Stream Ring -->
  <circle cx="64" cy="64" r="52" fill="url(#glow)" stroke="url(#grad)" stroke-width="4" stroke-dasharray="8 4" />
  
  <!-- Lightning Bolt (Fast Streaming) -->
  <path d="M 72,18 L 44,66 L 68,66 L 56,110 L 84,62 L 60,62 Z" fill="url(#grad)" />
  
  <!-- Stream Waves/Dots -->
  <circle cx="28" cy="64" r="4" fill="#ffffff" />
  <circle cx="100" cy="64" r="4" fill="#ffffff" />
</svg>
