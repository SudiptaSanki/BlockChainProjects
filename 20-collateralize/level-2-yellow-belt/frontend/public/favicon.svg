<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Outer Glow Hexagon -->
  <polygon points="64,10 114,39 114,97 64,126 14,97 14,39" fill="url(#glowGrad)" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round" />
  
  <!-- Stylized Lock formed as a 'C' -->
  <!-- Shackle (Arc of the C) -->
  <path d="M 80,48 A 20,20 0 0,0 44,48 V 72 A 20,20 0 0,0 80,72" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" />
  
  <!-- Vault Padlock Body -->
  <rect x="42" y="60" width="44" height="32" rx="8" fill="#020617" stroke="url(#grad)" stroke-width="6" />
  
  <!-- Keyhole detail -->
  <circle cx="64" cy="72" r="4" fill="url(#grad)" />
  <polygon points="62,72 66,72 68,84 60,84" fill="url(#grad)" />
</svg>
